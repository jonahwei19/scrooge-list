<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — The Scrooge List</title>
<meta property="og:site_name" content="The Scrooge List">
<meta property="og:type" content="profile">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=JetBrains+Mono:wght@400;600&display=fallback" rel="stylesheet">
<script>
(function(){try{var t=localStorage.getItem('scrooge-theme');if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';document.documentElement.dataset.theme=t;}catch(e){}})();
</script>
<style>
@font-face{font-family:'FrauncesFallback';src:local('Georgia');size-adjust:97%;ascent-override:96%;descent-override:24%;line-gap-override:0%}
@font-face{font-family:'NewsreaderFallback';src:local('Georgia');size-adjust:103%;ascent-override:92%;descent-override:24%;line-gap-override:0%}
:root{
  --paper:#FDFAF2;--paper-mid:#F7F0DC;--paper-deep:#ECDFBE;--paper-shadow:#D8C9A6;
  --ink:#19130B;--ink-soft:#3C2F22;--ink-fade:#6E5E46;--ink-ghost:#9F8E70;
  --rust:#8B2E1F;--rust-dark:#5D1C12;--gilt:#8C6B2D;--sepia:#735A3E;--rule:#22180E;--green:#4a6e3a;
  --row-alt:rgba(216,201,164,.12);
  --display:"Fraunces","FrauncesFallback",Georgia,serif;--body:"Newsreader","NewsreaderFallback",Georgia,serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
}
[data-theme="dark"]{
  --paper:#1F1409;--paper-mid:#29180D;--paper-deep:#332113;--paper-shadow:#5A452B;
  --ink:#F2DEB8;--ink-soft:#CDB489;--ink-fade:#9C835A;--ink-ghost:#6E5C3A;
  --rust:#E55A40;--rust-dark:#B33A24;--gilt:#DCAA38;--sepia:#A88B5C;--rule:#7A6843;--green:#9FC086;
  --row-alt:rgba(238,220,186,.04);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
h2,h3,.section-head,.year-anchor{scroll-margin-top:32px}
html,body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:17px;line-height:1.65;font-feature-settings:"onum","liga","kern";-webkit-font-smoothing:antialiased}
body{
  background:
    radial-gradient(ellipse 800px 400px at 15% 5%, rgba(139,46,31,.045), transparent 70%),
    radial-gradient(ellipse 900px 500px at 90% 95%, rgba(140,107,45,.055), transparent 70%),
    var(--paper);
  min-height:100vh;transition:background-color .4s, color .4s;
}
[data-theme="dark"] body{background:radial-gradient(ellipse 900px 500px at 15% 5%, rgba(209,74,50,.08), transparent 70%),radial-gradient(ellipse 1000px 600px at 90% 95%, rgba(212,160,50,.09), transparent 70%),var(--paper)}
.grain{position:fixed;inset:0;pointer-events:none;z-index:2;opacity:.13;mix-blend-mode:multiply;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='260' height='260'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.10 0 0 0 0 0.075 0 0 0 0 0.05 0 0 0 0.32 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
[data-theme="dark"] .grain{opacity:.18;mix-blend-mode:screen}
.foxing{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.13;mix-blend-mode:multiply;background-image:radial-gradient(circle at 8% 12%, rgba(140,107,45,.14), transparent 3%),radial-gradient(circle at 92% 22%, rgba(115,90,62,.1), transparent 2.5%),radial-gradient(circle at 73% 78%, rgba(139,46,31,.08), transparent 3%),radial-gradient(circle at 22% 87%, rgba(115,90,62,.11), transparent 2%)}

.sheet{position:relative;z-index:3;max-width:900px;margin:0 auto;padding:40px 36px 80px;animation:fadeUp .6s ease-out both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.nav{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:28px;font-family:var(--display);font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft)}
.nav a{color:var(--rust);text-decoration:none;border-bottom:1px solid var(--rust);padding-bottom:1px}
.nav button{background:none;border:none;cursor:pointer;font:inherit;color:inherit;letter-spacing:.22em}
.nav button:hover{color:var(--rust)}

.pmast{text-align:left;padding:36px 0 26px;border-top:2px solid var(--rule);border-bottom:1px solid var(--rule);margin-bottom:40px;position:relative}
.pmast::before{content:"";position:absolute;left:0;right:0;height:1px;background:var(--rule);top:3px}
.pmast .kicker{font-family:var(--display);font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;color:var(--rust);margin-bottom:14px;font-variation-settings:"opsz" 9,"SOFT" 60}
.pmast h1{font-family:var(--display);font-weight:800;font-variation-settings:"opsz" 72,"SOFT" 30;font-size:clamp(2.4rem,5vw,3.6rem);line-height:.98;letter-spacing:-.015em;color:var(--ink);margin-bottom:14px}
.pmast .subtitle{font-family:var(--display);font-style:italic;font-size:1.05rem;line-height:1.5;color:var(--ink-fade);font-variation-settings:"opsz" 24,"SOFT" 80;max-width:780px}

.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-bottom:64px}
.summary-cell{padding:24px 18px 22px;border-right:1px solid var(--paper-shadow);font-family:var(--display)}
.summary-cell:last-child{border-right:none}
.summary-cell .label{font-size:.64rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-fade);margin-bottom:9px;font-variation-settings:"opsz" 9,"SOFT" 50}
.summary-cell .value{font-size:1.45rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink);font-variation-settings:"opsz" 48,"SOFT" 30;line-height:1.05}
.summary-cell .value.tier-a{color:var(--rust)}
.summary-cell .value.tier-b{color:var(--gilt)}
.summary-cell .value.tier-c{color:var(--sepia)}
.summary-cell .value.ontrack{color:var(--green)}
.summary-cell .sub{font-size:.78rem;color:var(--ink-fade);margin-top:6px;font-style:italic;line-height:1.4}

h2{font-family:var(--display);font-style:italic;font-weight:500;font-variation-settings:"opsz" 72,"SOFT" 60;font-size:1.75rem;margin:54px 0 6px;color:var(--ink);letter-spacing:-.005em;padding-top:20px;border-top:1px solid var(--rule);position:relative}
h2:first-of-type{margin-top:48px}
h2::before{content:"";display:block;width:36px;height:2px;background:var(--rust);margin:-21px 0 16px}
h3{font-family:var(--display);font-weight:600;font-size:1.05rem;margin:30px 0 8px;color:var(--ink)}

p{color:var(--ink-soft);margin-bottom:16px;line-height:1.65}
a{color:var(--rust);text-decoration:none;border-bottom:1px solid rgba(139,46,31,.4)}
a:hover{background:rgba(139,46,31,.08)}

.callout{margin:28px 0 36px;line-height:1.6}
.callout > strong{font-family:var(--display);color:var(--ink);display:block;margin-bottom:6px}
.callout p:last-child{margin-bottom:0}

.events{margin:24px 0 36px;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.event{display:grid;grid-template-columns:90px 1fr 130px;gap:18px;padding:18px 10px;border-bottom:1px dotted var(--ink-ghost);align-items:baseline;font-variant-numeric:tabular-nums}
.event:last-child{border-bottom:none}
.event .when{font-family:var(--display);color:var(--ink-fade);font-size:.92rem;font-variation-settings:"opsz" 24}
.event .what{color:var(--ink)}
.event .what .recipient{color:var(--ink-soft)}
.event .what .role{display:inline-block;margin-right:8px;padding:1px 7px;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;border:1px solid currentColor;color:var(--ink-fade);font-family:var(--display);border-radius:2px}
.event .what .role.grant_out{color:var(--rust)}
.event .what .role.direct_gift{color:var(--rust)}
.event .what .role.transfer_in{color:var(--gilt)}
.event .what .role.pledge,.event .what .role.pledge_amendment{color:var(--sepia)}
.event .what .role.political{color:var(--gilt)}
.event .what .role.private_investment_not_charity{color:var(--ink-ghost);font-style:italic}
.event .amt{text-align:right;font-family:var(--display);font-weight:600;color:var(--ink)}
.event .amt a{font-size:.78rem;display:block;margin-top:2px;color:var(--rust);border:none}

.vehicle-list{margin:20px 0 36px;font-family:var(--display)}
.vehicle{padding:14px 0;margin:0;border-bottom:1px dotted var(--ink-ghost);line-height:1.55}
.vehicle:last-child{border-bottom:none}
.vehicle.closed{opacity:.85}
.vehicle .vname{font-weight:600;color:var(--ink)}
.vehicle.active .vname{color:var(--rust)}
.vehicle.opaque .vname{color:var(--gilt)}
.vehicle .vdetail{font-size:.92rem;color:var(--ink-fade);margin-top:3px}

.flags-grid{display:grid;grid-template-columns:auto 1fr;gap:14px 22px;margin:20px 0 36px;font-family:var(--display);font-size:.95rem;line-height:1.55}
.flag-code{font-family:var(--mono);font-size:.82rem;background:var(--paper-deep);color:var(--rust-dark);padding:3px 10px;border-radius:2px;white-space:nowrap;align-self:start}
[data-theme="dark"] .flag-code{color:var(--rust)}
.flag-text{color:var(--ink-soft)}

.ror-box{padding:0;margin:20px 0 36px;font-family:var(--display)}
.ror-status{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-fade);margin-bottom:8px}
.ror-text{color:var(--ink);font-style:italic;line-height:1.6}

.source-log{margin:24px 0 36px;font-size:.88rem;font-family:var(--display);font-variation-settings:"opsz" 14}
.source-log .src-row{padding:12px 0;border-bottom:1px dotted var(--ink-ghost);display:flex;flex-direction:column;gap:4px}
.source-log .src-row:last-child{border-bottom:none}
.source-log .src-row a{font-size:.86rem;line-height:1.45;overflow-wrap:anywhere;word-break:normal;display:inline-block;max-width:100%}
.source-log .src-row .src-when{color:var(--ink-fade);font-variant-numeric:tabular-nums;font-size:.78rem;letter-spacing:.02em;text-transform:uppercase;font-style:italic}

.todo-list{margin:14px 0 36px 22px;color:var(--ink-soft)}
.todo-list li{margin-bottom:9px;font-size:.92rem;line-height:1.55}
.todo-list li::marker{color:var(--gilt)}

.cibar{margin:18px 0 48px;font-family:var(--display);position:relative}
.cibar-legend{display:flex;gap:24px;flex-wrap:wrap;font-size:.74rem;letter-spacing:.04em;text-transform:none;color:var(--ink-soft);margin-bottom:14px;font-variation-settings:"opsz" 14,"SOFT" 50;font-style:italic;align-items:center}
.cibar-legend .lg{display:inline-flex;align-items:center;gap:8px}
.cibar-legend .sw{display:inline-block;flex:none}
.cibar-legend .sw.obs{width:22px;height:14px;background:var(--rust);border:1px solid var(--paper-shadow)}
.cibar-legend .sw.hidden{width:22px;height:14px;background:repeating-linear-gradient(45deg,rgba(139,46,31,.22) 0 4px,transparent 4px 8px);border:1px solid var(--paper-shadow)}
[data-theme="dark"] .cibar-legend .sw.hidden{background:repeating-linear-gradient(45deg,rgba(209,74,50,.32) 0 4px,transparent 4px 8px)}
.cibar-legend .sw.cap{width:6px;height:20px;background:transparent;border-left:2px dashed var(--gilt);border-right:none;border-top:none;border-bottom:none}
.cibar-legend strong{font-style:normal;color:var(--ink);font-weight:600}
.cibar-track{position:relative;height:34px;background:var(--paper-mid);border:1px solid var(--paper-shadow);overflow:hidden}
.cibar-track .obs{position:absolute;left:0;top:0;bottom:0;min-width:5px;background:var(--rust);transition:width .6s ease}
.cibar-track .hidden{position:absolute;left:0;top:0;bottom:0;background:repeating-linear-gradient(45deg,rgba(139,46,31,.18) 0 4px,transparent 4px 8px);transition:width .6s ease}
[data-theme="dark"] .cibar-track .hidden{background:repeating-linear-gradient(45deg,rgba(209,74,50,.28) 0 4px,transparent 4px 8px)}
.cibar-track .tick{position:absolute;top:-3px;bottom:-3px;width:14px;background:transparent;transform:translateX(-6px);cursor:pointer}
.cibar-track .tick::before{content:"";position:absolute;left:6px;top:0;bottom:0;width:2px;background:var(--gilt)}
.cibar-track .tick.tier-a::before{background:var(--ink-ghost)}
.cibar-track .obs,.cibar-track .hidden{cursor:pointer}
.cibar-track .tick-label{position:absolute;top:100%;margin-top:4px;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-fade);transform:translateX(-50%);white-space:nowrap}
.cibar-caption{margin-top:36px;font-size:.88rem;color:var(--ink-soft);font-style:italic;line-height:1.55}

.timeline{margin:18px 0 40px;padding:26px 14px 18px;background:var(--paper-mid);border:1px solid var(--paper-shadow);position:relative}
.tt-tip{
  position:absolute;left:0;top:0;
  min-width:240px;max-width:320px;
  padding:12px 14px 11px;
  background:var(--paper);border:1px solid var(--rule);
  font-family:var(--display);color:var(--ink);
  font-size:.88rem;line-height:1.4;
  box-shadow:0 6px 18px rgba(34,24,14,.18);
  pointer-events:none;
  opacity:0;transform:translateY(2px);
  transition:opacity .12s ease,transform .12s ease;
  z-index:10;
}
.tt-tip.show{opacity:1;transform:translateY(0)}
.tt-tip .tt-row1{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:4px}
.tt-tip .tt-year{font-family:var(--display);font-weight:600;font-variation-settings:"opsz" 36;font-size:1.05rem;color:var(--ink);font-variant-numeric:lining-nums tabular-nums;letter-spacing:.02em}
.tt-tip .tt-kind{font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-fade);font-variation-settings:"opsz" 9,"SOFT" 50}
.tt-tip .tt-kind.k-out{color:var(--rust)}
.tt-tip .tt-kind.k-xfer{color:var(--gilt)}
.tt-tip .tt-kind.k-pledge{color:var(--sepia)}
.tt-tip .tt-total{font-family:var(--display);font-weight:700;font-variation-settings:"opsz" 72,"SOFT" 30;font-size:1.5rem;color:var(--ink);font-variant-numeric:tabular-nums oldstyle-nums;line-height:1;margin-bottom:8px;letter-spacing:-.012em}
.tt-tip .tt-list{list-style:none;margin:0;padding:0}
.tt-tip .tt-list li{display:flex;justify-content:space-between;gap:14px;padding:3px 0;font-size:.84rem;line-height:1.35;border-bottom:1px dotted var(--ink-ghost)}
.tt-tip .tt-list li:last-child{border-bottom:none}
.tt-tip .rcpt{color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.tt-tip .rcpt-amt{color:var(--ink);font-variant-numeric:tabular-nums oldstyle-nums;font-weight:600;white-space:nowrap}
.tt-tip .rcpt-verify{display:inline-block;font-size:.7rem;font-weight:700;width:1.1em;text-align:center;border-radius:50%;margin-left:4px;cursor:help}
.tt-tip .rcpt-verify.ok{color:#1e7f3e;background:rgba(30,127,62,.12)}
.tt-tip .rcpt-verify.env{color:#8C6B2D;background:rgba(140,107,45,.12)}
.tt-tip .rcpt-verify.bad{color:#a93220;background:rgba(169,50,32,.12)}
[data-theme="dark"] .tt-tip .rcpt-verify.ok{color:#8fb57a;background:rgba(143,181,122,.12)}
[data-theme="dark"] .tt-tip .rcpt-verify.env{color:#D4A032;background:rgba(212,160,50,.12)}
[data-theme="dark"] .tt-tip .rcpt-verify.bad{color:#d14a32;background:rgba(209,74,50,.12)}
.tt-tip .tt-more{margin-top:6px;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-fade);font-style:italic}
[data-theme="dark"] .tt-tip{box-shadow:0 6px 22px rgba(0,0,0,.6)}
.timeline svg{width:100%;height:160px;display:block}
.timeline .bar{fill:var(--rust);transition:opacity .15s,filter .15s;cursor:pointer}
.timeline .bar.transfer{fill:var(--gilt)}
.timeline .bar.pledge{fill:var(--sepia);opacity:.5}
.timeline .bar:hover{opacity:1;filter:brightness(.9)}
.timeline .bar:focus{outline:none;filter:brightness(.85)}
.timeline .yeartick{cursor:pointer;fill:transparent}
.timeline .yeartick:hover ~ .yearlabel,.timeline .bar:hover ~ .yearlabel{fill:var(--ink)}
.timeline .yeartext.active{fill:var(--rust);font-weight:700}
.event{transition:background .25s,box-shadow .25s,border-color .25s}
.event.flash-year{background:rgba(139,46,31,.08);box-shadow:inset 3px 0 0 var(--rust);}
.event.flash-year:nth-child(even){background:rgba(139,46,31,.12)}
[data-theme="dark"] .event.flash-year{background:rgba(209,74,50,.12);box-shadow:inset 3px 0 0 var(--rust)}
.events-anchor{display:block;height:0;visibility:hidden;margin-top:-100px;padding-top:100px}
.timeline .axis{stroke:var(--ink-ghost);stroke-width:.5;opacity:.6}
.timeline .yeartext,.timeline .amttext{font-family:var(--display);font-size:10px;fill:var(--ink-fade);font-variation-settings:"opsz" 9,"SOFT" 60}
.timeline .yeartext{letter-spacing:.08em}
.timeline-legend{display:flex;gap:18px;font-family:var(--display);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-fade);margin-top:4px;padding:0 8px}
.timeline-legend .sw{display:inline-block;width:10px;height:10px;vertical-align:middle;margin-right:5px}
.timeline-legend .sw.grant_out{background:var(--rust)}
.timeline-legend .sw.transfer_in{background:var(--gilt)}
.timeline-legend .sw.pledge{background:var(--sepia);opacity:.5}

.colophon{text-align:center;padding-top:32px;margin-top:48px;border-top:2px solid var(--rule);position:relative}
.colophon::before{content:"";display:block;position:absolute;top:3px;left:0;right:0;height:1px;background:var(--rule)}
.col-line{font-family:var(--display);font-size:.8rem;letter-spacing:.06em;color:var(--ink-fade);margin:14px 0 4px}

@media (max-width:720px){
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .summary-cell{border-bottom:1px solid var(--paper-shadow)}
  .summary-cell:nth-child(odd){border-right:1px solid var(--paper-shadow)}
  .event{grid-template-columns:60px 1fr 90px;gap:10px;padding:12px 4px}
  .sheet{padding:30px 20px 60px}
  .cibar-legend{font-size:.62rem;gap:10px}
  .cibar-track .tick-label{font-size:.58rem}
}
@media (max-width:520px){
  .pmast h1{font-size:1.85rem}
  .summary-cell .value{font-size:1.2rem}
  .summary-cell .label{font-size:.58rem}
  .event{grid-template-columns:1fr;gap:4px;padding:14px 4px}
  .event .when{font-size:.78rem}
  .event .amt{text-align:left;margin-top:4px}
  .cibar-track .tick-label{display:none}
}
</style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<div class="foxing" aria-hidden="true"></div>

<main class="sheet" id="sheet">
  <nav class="nav">
    <a href="index.html">← The Ledger</a>
    <span id="navName"></span>
    <button id="themeToggle" type="button">Mode ◐</button>
  </nav>

  <div id="content">
    <p style="text-align:center;color:var(--ink-fade);padding:80px 0">Loading profile…</p>
  </div>

  <footer class="colophon">
    <p class="col-line"><a href="methodology.html">Methodology</a> · <a href="index.html">All subjects</a></p>
  </footer>
</main>

<script>
(function(){
  const toggle = document.getElementById('themeToggle');
  toggle.addEventListener('click', () => {
    const cur = document.documentElement.dataset.theme || 'light';
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('scrooge-theme', next); } catch(e) {}
  });
})();

const params = new URLSearchParams(location.search);
const id = params.get('id');
if (!id) {
  document.getElementById('content').innerHTML = '<p style="text-align:center;padding:60px 0">No subject specified. <a href="index.html">Return to the ledger.</a></p>';
} else {
  loadProfile(id);
}

const TIER_LABEL = {
  'A_VERIFIED_LOW': { label: 'Tier A · Verified Low', cls: 'tier-a' },
  'B_PROBABLY_LOW': { label: 'Tier B · Probably Low', cls: 'tier-b' },
  'C_OPAQUE': { label: 'Tier C · Opaque', cls: 'tier-c' },
  'ON_TRACK': { label: 'On Track · Not Scrooge', cls: 'ontrack' },
};

const fmtUsd = (usd) => {
  if (usd == null) return '—';
  const b = usd / 1e9;
  if (Math.abs(b) >= 1) return '$' + b.toFixed(b >= 10 ? 1 : 2) + 'B';
  const m = usd / 1e6;
  return '$' + m.toFixed(0) + 'M';
};
const fmtNw = b => b == null ? '—' : '$' + (b >= 100 ? b.toFixed(0) : b.toFixed(1)) + 'B';
const fmtRatio = r => r == null ? '—' : (r >= 1 ? r.toFixed(1) + '×' : (r * 100).toFixed(0) + '%');
const esc = s => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ROLE_LABELS = {
  grant_out: 'Grant',
  direct_gift: 'Direct gift',
  transfer_in: 'Transfer in',
  pledge: 'Pledge',
  pledge_amendment: 'Pledge update',
  political: 'Political',
  private_investment_not_charity: 'Private investment',
};
const roleLabel = r => ROLE_LABELS[r] || (r ? String(r).replace(/_/g, ' ') : '');

async function loadProfile(id) {
  try {
    const res = await fetch('profiles/' + encodeURIComponent(id) + '.json');
    if (!res.ok) throw new Error('No record for ' + id);
    const rec = await res.json();
    render(rec);
  } catch (e) {
    document.getElementById('content').innerHTML = `<p style="text-align:center;padding:60px 0;color:var(--rust)">Could not load profile: ${esc(e.message)}<br><a href="index.html">Return to the ledger.</a></p>`;
  }
}

function render(rec) {
  const p = rec.person || {};
  const nw = rec.net_worth || {};
  const rollup = rec.rollup || {};
  const vehicles = rec.detected_vehicles || {};
  const ror = rec.right_of_reply || {};
  const tier = normalizeTier(rollup.tier || '');
  const tierInfo = TIER_LABEL[tier] || { label: rollup.tier || 'Unknown', cls: '' };

  document.getElementById('navName').textContent = (p.name_display || '').toUpperCase();
  document.title = (p.name_display || 'Profile') + ' — The Scrooge List';

  // Headline observable: prefer the rollup judgment, but if it's zero AND we
  // have a non-zero strict event sum, use the event sum (the graph below pulls
  // from the same field — they should agree). This prevents the contradiction
  // where the summary says "$0 given" while the graph plots $2B in bars.
  const rollupObs = rollup.observable_giving_usd || 0;
  const fromEventsObs = rollup.observable_from_events_usd || 0;
  const observable = (rollupObs > 0) ? rollupObs : fromEventsObs;
  // Prefer the aggregator-derived 5%-per-year benchmark (canonical for v3 ranking);
  // fall back to the agent-written legacy field for any record that missed the refresh.
  const expected = rollup.expected_5pct_tenure_usd
    || rollup.expected_giving_usd_10pct_liquid_weighted_by_tenure
    || rollup.expected_giving_usd
    || 0;
  // Recompute shortfall when we substituted the event sum, so the headline
  // shortfall agrees with the displayed observable.
  const shortfall = (rollupObs > 0 && rollup.shortfall_5pct_usd != null)
    ? rollup.shortfall_5pct_usd
    : (expected ? Math.max(0, expected - observable) : null);
  const ratio = rollup.ratio_observable_to_5pct_tenure
    || rollup.observable_ratio_to_expected;
  const nwRange = nw.range_usd_billions;

  let html = `
    <header class="pmast">
      <div class="kicker">${esc(tierInfo.label)} · profile</div>
      <h1>${esc(p.name_display || 'Unknown')}</h1>
      <div class="subtitle">${esc(p.wealth_source || '')}${p.dob_year ? ' · b. ' + p.dob_year : ''}</div>
    </header>

    <div class="summary-grid">
      <div class="summary-cell">
        <div class="label">Net Worth</div>
        <div class="value">${fmtNw(nw.best_estimate_usd_billions)}</div>
        <div class="sub">${nwRange ? 'Range $' + nwRange[0] + '–' + nwRange[1] + 'B' : ''}</div>
      </div>
      <div class="summary-cell">
        <div class="label">Documented giving</div>
        <div class="value">${fmtUsd(observable)}</div>
        <div class="sub">${rollup.observable_giving_method ? 'lifetime, sourced and verified' : ''}</div>
      </div>
      <div class="summary-cell">
        <div class="label">Dollars not given</div>
        <div class="value">${fmtUsd(shortfall)}</div>
        <div class="sub">vs. what they could reasonably have given</div>
      </div>
      <div class="summary-cell">
        <div class="label">Bucket</div>
        <div class="value ${tierInfo.cls}">${esc((tierInfo.label.split('·')[0] || '').trim())}</div>
        <div class="sub">${esc((tierInfo.label.split('·')[1] || '').trim())}</div>
      </div>
    </div>
  `;

  // Confidence-interval bar — Observable | Hidden upper | Capacity
  const hiddenUpperObj = (rollup.hidden_upper_usd || {});
  const hiddenUpper = hiddenUpperObj.total_usd || 0;
  // Extract the named components so we can show the breakdown in the tooltip.
  // These come straight from the source v3 record (hand-curated per subject).
  const hiddenComponents = [];
  const componentMap = [
    ['daf_uplift_usd', 'DAFs (donor-advised funds — opaque downstream)'],
    ['llc_uplift_usd', 'Philanthropic LLCs (no 990 filing requirement)'],
    ['offshore_uplift_usd', 'Offshore vehicles'],
    ['anonymous_cohort_uplift_usd', 'Anonymous giving (cohort estimate)'],
    ['religious_cohort_uplift_usd', 'Religious giving (tithing-norm estimate)'],
    ['trust_outcome_uncertainty_usd', 'Charitable trust uncertainty envelope'],
    ['the_foundation_school_uplift_usd', '"The Foundation" school uplift'],
    ['pre_2019_msdf_backfill_usd', 'Pre-2019 historical 990-PF backfill'],
    ['gates_foundation_tenure_attribution_usd', 'Gates Foundation tenure attribution'],
  ];
  for (const [key, label] of componentMap) {
    const v = hiddenUpperObj[key];
    if (typeof v === 'number' && v > 0) hiddenComponents.push({ key, label, amount: v });
  }
  if (expected > 0) {
    // Scale: benchmark (expected) sits at 100. Show up to 120 for overshoot.
    const obsPct = Math.min(100, (observable / expected) * 100);
    const totalPct = Math.min(140, ((observable + hiddenUpper) / expected) * 100);
    const hiddenPct = Math.max(0, totalPct - obsPct);
    const trackMax = Math.max(120, totalPct + 5);
    const obsWidth = (obsPct / trackMax) * 100;
    const totalWidth = (totalPct / trackMax) * 100;
    const capPos = (100 / trackMax) * 100;

    const tenureYrs = (rec.years_as_billionaire_approx != null) ? rec.years_as_billionaire_approx : null;
    const liquidPct = (rec.liquidity_estimate_pct != null) ? rec.liquidity_estimate_pct : null;
    const nwBest = rec.net_worth_best_usd_b ? rec.net_worth_best_usd_b * 1e9 : null;
    const cibarPayload = {
      obs:    { amount: observable, pct: obsPct,    pctOfCap: (observable/expected)*100 },
      hidden: { amount: hiddenUpper, pct: hiddenPct, pctOfCap: (hiddenUpper/expected)*100,
                components: hiddenComponents },
      cap:    { amount: expected, pct: 100, tenure: tenureYrs, liquidPct: liquidPct, nw: nwBest },
      shortfall: shortfall, ratio: ratio,
    };
    html += `<div class="cibar">
      <div class="cibar-legend">
        <span class="lg"><span class="sw obs"></span><strong>What they gave</strong> (we can prove it)</span>
        <span class="lg"><span class="sw hidden"></span><strong>Could be giving in secret</strong> (upper bound)</span>
        <span class="lg"><span class="sw cap"></span><strong>The benchmark</strong>: what they could've given</span>
      </div>
      <div class="cibar-track" id="cibarTrack" data-payload='${esc(JSON.stringify(cibarPayload))}'>
        <div class="hidden" data-zone="hidden" tabindex="0" style="width:${totalWidth}%"></div>
        <div class="obs" data-zone="obs" tabindex="0" style="width:${obsWidth}%"></div>
        <div class="tick cap" data-zone="cap" tabindex="0" style="left:${capPos}%"><span class="tick-label" style="left:${capPos}%">100% · Benchmark</span></div>
      </div>
      <div class="tt-tip" id="cibarTip" role="tooltip" aria-hidden="true"></div>
      <p class="cibar-caption">They've given <strong>${fmtRatio(ratio)}</strong> of the benchmark. The benchmark is <strong>${fmtUsd(expected)}</strong>: 5% of their spendable wealth, every year since they became a billionaire. The shortfall is <strong>${fmtUsd(shortfall)}</strong>.${hiddenUpper >= 1e7 ? ` Up to <strong>${fmtUsd(hiddenUpper)}</strong> could be hidden in private vehicles we can't see into.` : ` We couldn't find any private vehicles where meaningful giving might be hiding.`}</p>
      <p class="cibar-caption" style="margin-top:8px;font-size:.78rem;font-style:normal;letter-spacing:.04em;color:var(--ink-fade)"><em>Hover any segment for details.</em></p>
    </div>`;
  }

  // Reconciliation: when the agent's rollup diverges materially from the
  // strict event sum, surface it. Transparency over hiding.
  // Special case: when rollup says 0 but events have real dollars, we already
  // substituted the event sum into `observable` above; surface that here too.
  const fromEvents = rollup.observable_from_events_usd;
  if (rollupObs === 0 && fromEvents > 0) {
    html += `<div class="callout">
      <strong>Why the headline = the event sum</strong>
      <p>Our research record listed <strong>$0</strong> as the personal headline figure, usually because the giving routes through DAFs or other opaque vehicles where individual disbursements can't be traced. The cited grants and direct gifts below total <strong>${fmtUsd(fromEvents)}</strong>, so we use that event sum as the headline to match the timeline below.</p>
    </div>`;
  } else {
    const drift = rollup.observable_drift_pct;
    if (fromEvents && observable && drift != null && drift >= 0.20) {
      const direction = fromEvents > observable ? 'higher' : 'lower';
      html += `<div class="callout">
        <strong>Why two numbers don't match</strong>
        <p>The headline documented giving figure (<strong>${fmtUsd(observable)}</strong>) is what we publish as theirs personally. Adding up only the individual grants and direct gifts listed below totals <strong>${fmtUsd(fromEvents)}</strong> — ${direction} by ${(drift*100).toFixed(0)}%.</p>
        <p style="font-style:italic;color:var(--ink-fade);font-size:.9rem">A gap usually means lifetime totals cited in sources but not broken down into discrete events (headline &gt; event sum), or family-foundation portions we excluded from their personal share (headline &lt; event sum). The event list below is the trail you can audit.</p>
      </div>`;
    }
  }

  // Hidden-upper breakdown: surface the components that make up the
  // "could be giving in secret" upper bound so the reader can see how it
  // was derived (was previously a single opaque number).
  if (hiddenUpper > 0 && hiddenComponents.length > 0) {
    const rows = hiddenComponents.map(c =>
      `<li><span class="rcpt">${esc(c.label)}</span><span class="rcpt-amt">${fmtUsd(c.amount)}</span></li>`
    ).join('');
    html += `<div class="callout">
      <strong>How the "could be giving in secret" upper bound was built</strong>
      <p style="font-size:.92rem;margin-bottom:8px">${fmtUsd(hiddenUpper)} total, summed from hand-estimated upper bounds for each opaque channel:</p>
      <ul class="tt-list" style="font-size:.9rem;margin:8px 0">${rows}</ul>
      <p style="font-style:italic;color:var(--ink-fade);font-size:.85rem">Each component is a per-subject judgment by the research agent (methodology notes in the source record under <code>hidden_upper_usd</code>). It's an upper bound — the most plausible giving via that channel — not a measurement.</p>
    </div>`;
  }

  // Per-year sanity tripwire: if any single year exceeded 20% of net worth,
  // surface the warning. Almost always means the LLM extracted a cumulative
  // figure as a single-year transaction. Visible to the reader.
  const sanityYear = rollup.sanity_flag_yearly_giving_exceeds_20pct_nw;
  if (sanityYear) {
    html += `<div class="callout">
      <strong>Possible double-count: single-year giving exceeds 20% of net worth</strong>
      <p style="font-size:.92rem">${esc(sanityYear)}</p>
      <p style="font-style:italic;color:var(--ink-fade);font-size:.85rem">A real billionaire rarely gives more than 20% of their net worth in a single year. When this fires, it almost always means a press article cited a lifetime or cumulative figure that the extractor recorded as a single-year transaction. We surface it here rather than silently inflating the headline.</p>
    </div>`;
  }

  // Tier-consistency tripwire: if the tier label says "ON_TRACK" but the
  // numbers say <10% of expected, surface the contradiction.
  const sanityTier = rollup.sanity_flag_tier_inconsistent;
  if (sanityTier) {
    html += `<div class="callout">
      <strong>Tier vs. math discrepancy</strong>
      <p style="font-size:.92rem">${esc(sanityTier)}</p>
    </div>`;
  }

  // Per-year giving timeline (only if we have multi-year grant_out data)
  html += renderTimeline(rec);

  // Detected vehicles
  html += renderVehicles(vehicles);

  // Cited events
  const events = (rec.cited_events || []).concat(rec.pledges_and_announcements || []);
  if (events.length) {
    html += `<h2>Cited Events</h2>`;
    html += '<p style="font-size:.92rem;color:var(--ink-fade);font-style:italic">Every documented dollar of giving (and every promise) with its source. <strong>Grant</strong> and <strong>Direct gift</strong> count toward documented giving. <strong>Transfer in</strong> is money moving into their own foundation or fund; we don\'t count it, to avoid double-counting when that foundation later makes its own grants. A <strong>Pledge</strong> only counts once the money actually moves.</p>';
    html += `<div class="events">`;
    const sorted = [...events].sort((a, b) => {
      const ay = a.year || (a.date ? a.date.substring(0,4) : 0);
      const by = b.year || (b.date ? b.date.substring(0,4) : 0);
      return (by || 0) - (ay || 0);
    });
    let lastYearAnchored = null;
    for (const ev of sorted) {
      const when = ev.date || ev.year || (ev.year_range ? ev.year_range.join('–') : '');
      const role = ev.event_role || '';
      const amt = ev.amount_usd || ev.pledged_amount_usd || ev.pledged_amount_usd_at_signing_estimate;
      const recipient = ev.recipient || '';
      const donor = ev.donor_entity || '';
      const note = ev.classification_note || ev.dedup_note || ev.notes || '';
      const roleCls = role.replace(/[^a-z_]/g, '_');
      let evYear = ev.year || (ev.date ? parseInt(String(ev.date).substring(0, 4)) : null);
      if (!evYear && ev.year_range) evYear = ev.year_range[0];
      const yearAttr = evYear ? ` data-year="${evYear}"` : '';
      const anchor = (evYear && evYear !== lastYearAnchored) ? `<span class="events-anchor" id="year-events-${evYear}"></span>` : '';
      if (evYear) lastYearAnchored = evYear;
      html += `${anchor}<div class="event"${yearAttr}>
        <div class="when">${esc(when)}</div>
        <div class="what">
          <span class="role ${esc(roleCls)}">${esc(roleLabel(role))}</span>
          ${esc(donor)}${donor && recipient ? ' → ' : ''}<span class="recipient">${esc(recipient)}</span>
          ${note ? '<div style="font-size:.88rem;color:var(--ink-fade);margin-top:4px;font-style:italic">' + esc(note) + '</div>' : ''}
        </div>
        <div class="amt">
          ${amt ? fmtUsd(amt) : '—'}
          ${ev.source_url ? '<a href="' + esc(ev.source_url) + '" target="_blank" rel="noopener">source →</a>' : ''}
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  // Political
  const pol = rec.political_giving;
  if (pol && pol.observed_total_2021_2025_usd) {
    html += `<h2>Political Giving</h2>
      <p>Tracked separately. <strong>${fmtUsd(pol.observed_total_2021_2025_usd)}</strong> in federal political giving 2021–2025. Not counted as philanthropy.</p>
      <p style="font-size:.9rem;color:var(--ink-fade);font-style:italic">${esc(pol.substitution_note || pol.observed_total_note || '')}</p>`;
    if ((pol.sources || []).length) {
      html += `<div class="source-log">`;
      for (const s of pol.sources) {
        html += `<div class="src-row"><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.publisher || s.url)}</a><span class="src-when">${esc(s.event_date || s.cumulative_since || s.retrieved_at || '')}</span></div>`;
      }
      html += `</div>`;
    }
  }

  // Red flags
  const flags = rec.red_flags || [];
  if (flags.length) {
    html += `<h2>Red Flags</h2><div class="flags-grid">`;
    for (const f of flags) {
      const code = typeof f === 'string' ? f : (f.flag || '');
      const evidence = typeof f === 'string' ? '' : (f.evidence || '');
      const srcUrl = typeof f === 'string' ? '' : (f.source_url || '');
      html += `<span class="flag-code">${esc(code)}</span><div class="flag-text">${esc(evidence)}${srcUrl ? ' <a href="' + esc(srcUrl) + '" target="_blank" rel="noopener">source →</a>' : ''}</div>`;
    }
    html += `</div>`;
  }

  const notPresent = rec.red_flags_not_present || [];
  if (notPresent.length) {
    html += `<div class="callout green"><strong>Flags we considered but didn't apply</strong>`;
    html += '<ul style="margin-top:6px">';
    for (const np of notPresent) html += `<li>${esc(np)}</li>`;
    html += '</ul></div>';
  }

  // Right of reply
  html += `<h2>Right of Reply</h2>
    <div class="ror-box">
      <div class="ror-status">Status · ${esc((ror.status || 'not_yet_requested').replace(/_/g, ' '))}</div>
      <div class="ror-text">${ror.response_text ? esc(ror.response_text) : 'No response yet. We email each Tier A and Tier B billionaire before publishing and post their reply here, unedited. See the <a href="methodology.html">methodology</a> for how we contact people.'}</div>
      ${ror.response_received_date ? '<div style="font-size:.82rem;color:var(--ink-fade);margin-top:8px">Received ' + esc(ror.response_received_date) + '</div>' : ''}
    </div>`;

  // Verification TODOs
  const todos = rec.verification_todos_before_publish || [];
  if (todos.length) {
    html += `<h2>Open Verification Items</h2>
    <p style="font-size:.92rem;color:var(--ink-fade);font-style:italic">Things we still need to check on this profile.</p>
    <ol class="todo-list">`;
    for (const t of todos) html += `<li>${esc(t)}</li>`;
    html += `</ol>`;
  }

  // All sources
  const allSources = rec.sources_all || [];
  if (allSources.length) {
    html += `<h2>Source Log</h2><div class="source-log">`;
    for (const s of allSources) {
      html += `<div class="src-row">
        <a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.url)}</a>
        <span class="src-when">${esc(s.retrieved_at || '')}${s.used_for ? ' · ' + esc(s.used_for) : ''}</span>
      </div>`;
    }
    html += `</div>`;
  }

  document.getElementById('content').innerHTML = html;
  wireTimelineClicks();
  wireCibarHover();
}

function wireTimelineClicks() {
  const tl = document.querySelector('.timeline');
  if (!tl) return;
  const tip = document.getElementById('tlTip');
  let flashTimer = null;

  function jumpToYear(year) {
    if (!year) return;
    const anchor = document.getElementById('year-events-' + year);
    const matches = document.querySelectorAll('.event[data-year="' + year + '"]');
    document.querySelectorAll('.event.flash-year').forEach(el => el.classList.remove('flash-year'));
    matches.forEach(el => el.classList.add('flash-year'));
    if (anchor) anchor.scrollIntoView({behavior:'smooth', block:'start'});
    else if (matches[0]) matches[0].scrollIntoView({behavior:'smooth', block:'center'});
    if (flashTimer) clearTimeout(flashTimer);
    flashTimer = setTimeout(() => {
      document.querySelectorAll('.event.flash-year').forEach(el => el.classList.remove('flash-year'));
    }, 4500);
  }

  function hideTip() {
    if (!tip) return;
    tip.classList.remove('show');
    tip.setAttribute('aria-hidden', 'true');
  }

  function buildTipHtml(year, kind) {
    const d = (window.__timelineDetail || {})[year + '|' + kind];
    if (!d) return '';
    const kindLabel = kind === 'out' ? 'Observable out' : kind === 'transfer' ? 'Transfer in to vehicle' : 'Pledge / announcement';
    const kindCls = kind === 'out' ? 'k-out' : kind === 'transfer' ? 'k-xfer' : 'k-pledge';
    const items = d.items.slice(0, 4);
    const more = d.items.length - items.length;
    const listHtml = items.map(it => {
      const arrow = kind === 'transfer' ? '←' : '→';
      const target = it.recipient || (kind === 'transfer' ? (it.donor || '—') : '—');
      const flow = kind === 'transfer' && it.donor
        ? `${esc(it.donor)} ${arrow} ${esc(target)}`
        : `${arrow} ${esc(target)}`;
      // Recipient-side cross-check badge:
      //   ✓ true            — foundation transfer with envelope fit (strongest)
      //   ◯ envelope_fit    — recipient could absorb gift but no donor-specific match
      //   ! false           — recipient 990 says contributions < gift amount
      let badge = '';
      if (it.verified === 'true') badge = ' <span class="rcpt-verify ok" title="Foundation→foundation transfer; recipient 990 reports total contributions ≥ this gift">✓</span>';
      else if (it.verified === 'envelope_fit') badge = ' <span class="rcpt-verify env" title="Recipient 990 contributions could absorb this gift, but does NOT confirm a donor-specific match (especially weak for DAF sponsors / billion-dollar charities)">◯</span>';
      else if (it.verified === 'false') badge = ' <span class="rcpt-verify bad" title="Recipient 990 contributions less than gift amount — likely timing lag or mis-extraction">!</span>';
      return `<li><span class="rcpt">${flow}${badge}</span><span class="rcpt-amt">${fmtUsd(it.amount)}</span></li>`;
    }).join('');
    return `
      <div class="tt-row1"><span class="tt-year">${year}</span><span class="tt-kind ${kindCls}">${kindLabel}</span></div>
      <div class="tt-total">${fmtUsd(d.total)}</div>
      <ul class="tt-list">${listHtml}</ul>
      ${more > 0 ? `<div class="tt-more">+${more} more — click for full evidence</div>` : '<div class="tt-more">Click to jump to evidence</div>'}
    `;
  }

  function positionTip(rect) {
    if (!tip || !tip.classList.contains('show')) return;
    const tlRect = tl.getBoundingClientRect();
    const tipW = tip.offsetWidth, tipH = tip.offsetHeight;
    let left = rect.left - tlRect.left + rect.width / 2 - tipW / 2;
    left = Math.max(8, Math.min(left, tlRect.width - tipW - 8));
    let top = rect.top - tlRect.top - tipH - 12; // above the bar
    if (top < 4) top = rect.bottom - tlRect.top + 12; // flip below if no room above
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
  }

  function showTip(target) {
    if (!tip) return;
    const year = target.getAttribute('data-year');
    let kind = target.getAttribute('data-kind');
    if (!kind) {
      // .yeartick (axis) — pick the largest kind for that year
      const d = window.__timelineDetail || {};
      const candidates = ['out', 'transfer', 'pledge'].map(k => ({k, v: d[year+'|'+k]?.total || 0})).sort((a,b) => b.v - a.v);
      kind = candidates[0].k;
      if (!d[year+'|'+kind]) return;
    }
    const html = buildTipHtml(year, kind);
    if (!html) return;
    tip.innerHTML = html;
    tip.classList.add('show');
    tip.setAttribute('aria-hidden', 'false');
    positionTip(target.getBoundingClientRect());
  }

  tl.addEventListener('mouseover', e => {
    const target = e.target.closest('[data-year]');
    if (!target) return;
    showTip(target);
  });
  tl.addEventListener('mouseout', e => {
    const to = e.relatedTarget;
    if (to && (to.closest && (to.closest('.timeline') || to.closest('.tt-tip')))) return;
    hideTip();
  });
  tl.addEventListener('focusin', e => {
    const target = e.target.closest('[data-year]');
    if (!target) return;
    showTip(target);
  });
  tl.addEventListener('focusout', () => hideTip());

  tl.addEventListener('click', e => {
    const target = e.target.closest('[data-year]');
    if (!target) return;
    e.preventDefault();
    hideTip();
    jumpToYear(target.getAttribute('data-year'));
  });
  tl.addEventListener('keydown', e => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const target = e.target.closest('[data-year]');
    if (!target) return;
    e.preventDefault();
    hideTip();
    jumpToYear(target.getAttribute('data-year'));
  });
}

function wireCibarHover() {
  const cibar = document.querySelector('.cibar');
  const track = document.getElementById('cibarTrack');
  const tip = document.getElementById('cibarTip');
  if (!cibar || !track || !tip) return;

  let payload;
  try { payload = JSON.parse(track.dataset.payload || '{}'); }
  catch { return; }

  function buildTipHtml(zone) {
    if (zone === 'obs') {
      const d = payload.obs;
      const pct = (d.pctOfCap || 0).toFixed(1);
      return `
        <div class="tt-row1"><span class="tt-year">Documented giving</span><span class="tt-kind k-out">verified</span></div>
        <div class="tt-total">${fmtUsd(d.amount)}</div>
        <ul class="tt-list">
          <li><span class="rcpt">Of what they could have given</span><span class="rcpt-amt">${pct}%</span></li>
        </ul>
        <div class="tt-more">Cited grants, foundation tax filings, announced gifts</div>`;
    }
    if (zone === 'hidden') {
      const d = payload.hidden;
      const pct = (d.pctOfCap || 0).toFixed(1);
      const comps = d.components || [];
      const compRows = comps.length
        ? comps.map(c => `<li><span class="rcpt">${esc(c.label)}</span><span class="rcpt-amt">${fmtUsd(c.amount)}</span></li>`).join('')
        : `<li><span class="rcpt">No itemized components on this subject</span><span class="rcpt-amt">—</span></li>`;
      return `
        <div class="tt-row1"><span class="tt-year">Possible secret giving</span><span class="tt-kind k-xfer">unverifiable</span></div>
        <div class="tt-total">${fmtUsd(d.amount)}</div>
        <ul class="tt-list">${compRows}</ul>
        <div class="tt-more">Each component is a hand-estimated upper bound for one channel of opaque giving. Methodology in the source record's <code>hidden_upper_usd</code>; we sum them.</div>`;
    }
    if (zone === 'cap') {
      const d = payload.cap;
      const tenure = d.tenure != null ? `${d.tenure} years` : '—';
      const liquid = d.liquidPct != null ? `${(d.liquidPct*100).toFixed(0)}%` : '—';
      const nw = d.nw ? fmtUsd(d.nw) : '—';
      return `
        <div class="tt-row1"><span class="tt-year">What they could have given</span><span class="tt-kind k-pledge">reasonable target</span></div>
        <div class="tt-total">${fmtUsd(d.amount)}</div>
        <ul class="tt-list">
          <li><span class="rcpt">Net worth</span><span class="rcpt-amt">${nw}</span></li>
          <li><span class="rcpt">Spendable share</span><span class="rcpt-amt">${liquid}</span></li>
          <li><span class="rcpt">Years as a billionaire</span><span class="rcpt-amt">${tenure}</span></li>
          <li><span class="rcpt">Gap vs. documented</span><span class="rcpt-amt">${fmtUsd(payload.shortfall)}</span></li>
        </ul>
        <div class="tt-more">5% of spendable wealth, every year as a billionaire</div>`;
    }
    return '';
  }

  function positionTip(rect) {
    if (!tip.classList.contains('show')) return;
    const cRect = cibar.getBoundingClientRect();
    const tipW = tip.offsetWidth, tipH = tip.offsetHeight;
    let left = rect.left - cRect.left + rect.width / 2 - tipW / 2;
    left = Math.max(8, Math.min(left, cRect.width - tipW - 8));
    let top = rect.top - cRect.top - tipH - 12;
    if (top < 4) top = rect.bottom - cRect.top + 12;
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
  }

  function showTip(target) {
    const zone = target.getAttribute('data-zone');
    if (!zone) return;
    const html = buildTipHtml(zone);
    if (!html) return;
    tip.innerHTML = html;
    tip.classList.add('show');
    tip.setAttribute('aria-hidden', 'false');
    positionTip(target.getBoundingClientRect());
  }
  function hideTip() {
    tip.classList.remove('show');
    tip.setAttribute('aria-hidden', 'true');
  }

  track.addEventListener('mouseover', e => {
    const target = e.target.closest('[data-zone]');
    if (!target) return;
    showTip(target);
  });
  track.addEventListener('mouseout', e => {
    const to = e.relatedTarget;
    if (to && to.closest && (to.closest('.cibar-track') || to.closest('.tt-tip'))) return;
    hideTip();
  });
  track.addEventListener('focusin', e => {
    const target = e.target.closest('[data-zone]');
    if (!target) return;
    showTip(target);
  });
  track.addEventListener('focusout', () => hideTip());
}

function renderTimeline(rec) {
  const events = (rec.cited_events || []).concat(rec.pledges_and_announcements || []);
  const by = new Map();
  // Per-(year, kind) detail: amount + recipient breakdown
  const KIND_OUT = 'out', KIND_XFER = 'transfer', KIND_PLEDGE = 'pledge';
  const kindOf = role => {
    if (role === 'grant_out' || role === 'direct_gift') return KIND_OUT;
    if (role === 'transfer_in') return KIND_XFER;
    if (role === 'pledge' || role === 'pledge_amendment') return KIND_PLEDGE;
    return null;
  };
  const detail = {}; // detail['2024|out'] = { total, role, items:[{recipient,donor,amount,note,sourceUrl}] }

  for (const ev of events) {
    let year = ev.year || (ev.date ? parseInt(String(ev.date).substring(0, 4)) : null);
    if (!year && ev.year_range) year = ev.year_range[0];
    if (!year || year < 1995 || year > 2030) continue;
    const role = ev.event_role || 'other';
    const kind = kindOf(role);
    if (!kind) continue;
    const amt = ev.amount_usd || ev.pledged_amount_usd || 0;
    if (!amt) continue;
    const sumKey = year + '|' + role;
    by.set(sumKey, (by.get(sumKey) || 0) + amt);
    const dKey = year + '|' + kind;
    if (!detail[dKey]) detail[dKey] = { total: 0, kind, year, items: [] };
    detail[dKey].total += amt;
    detail[dKey].items.push({
      recipient: ev.recipient || '',
      donor: ev.donor_entity || '',
      amount: amt,
      role,
      note: ev.classification_note || ev.notes || '',
      sourceUrl: ev.source_url || '',
      verified: ev.recipient_verified || null,
      verifyNote: ev.recipient_verification_note || '',
      verifyUrl: ev.recipient_filing_url || '',
    });
  }
  if (by.size < 3) return '';

  const years = Array.from(new Set(Array.from(by.keys()).map(k => parseInt(k.split('|')[0])))).sort((a, b) => a - b);
  if (years.length < 3) return '';

  // Sort each detail bucket's items by amount desc
  for (const k of Object.keys(detail)) {
    detail[k].items.sort((a, b) => b.amount - a.amount);
  }
  // Stash for hover lookup
  window.__timelineDetail = detail;

  const yMin = years[0], yMax = years[years.length - 1];
  const roles = ['grant_out', 'direct_gift', 'transfer_in', 'pledge', 'pledge_amendment'];
  const yearTotals = years.map(y => {
    const buckets = {};
    for (const r of roles) buckets[r] = by.get(y + '|' + r) || 0;
    return { year: y, buckets };
  });
  const maxAmt = Math.max(...yearTotals.map(yt => Math.max(...Object.values(yt.buckets))));
  if (maxAmt === 0) return '';

  const W = 1000, H = 160, PAD_L = 40, PAD_R = 20, PAD_T = 20, PAD_B = 28;
  const plotW = W - PAD_L - PAD_R;
  const plotH = H - PAD_T - PAD_B;
  const yearCount = yMax - yMin + 1;
  const barWidth = Math.min(28, (plotW / yearCount) * 0.8);
  const xOf = y => PAD_L + ((y - yMin) / Math.max(1, yMax - yMin)) * plotW;
  const hOf = amt => (amt / maxAmt) * plotH;

  let inner = `<line class="axis" x1="${PAD_L}" y1="${H - PAD_B}" x2="${W - PAD_R}" y2="${H - PAD_B}"/>`;
  for (let y = yMin; y <= yMax; y += Math.max(1, Math.floor(yearCount / 8))) {
    const x = xOf(y);
    inner += `<text class="yeartext" x="${x}" y="${H - PAD_B + 14}" text-anchor="middle">${y}</text>`;
  }

  for (const yt of yearTotals) {
    const givingOut = (yt.buckets.grant_out || 0) + (yt.buckets.direct_gift || 0);
    const transferIn = yt.buckets.transfer_in || 0;
    const pledge = (yt.buckets.pledge || 0) + (yt.buckets.pledge_amendment || 0);
    const cx = xOf(yt.year);
    const totalThisYear = givingOut + transferIn + pledge;
    if (givingOut > 0) {
      const h = hOf(givingOut);
      inner += `<rect class="bar" data-year="${yt.year}" data-kind="${KIND_OUT}" tabindex="0" x="${cx - barWidth / 2}" y="${H - PAD_B - h}" width="${barWidth}" height="${h}"></rect>`;
    }
    if (transferIn > 0) {
      const h = hOf(transferIn);
      const offset = givingOut > 0 ? -barWidth / 2 - 2 : 0;
      inner += `<rect class="bar transfer" data-year="${yt.year}" data-kind="${KIND_XFER}" tabindex="0" x="${cx - barWidth / 2 + offset}" y="${H - PAD_B - h}" width="${Math.max(4, barWidth / 2)}" height="${h}"></rect>`;
    }
    if (pledge > 0 && !givingOut) {
      const h = hOf(pledge);
      inner += `<rect class="bar pledge" data-year="${yt.year}" data-kind="${KIND_PLEDGE}" tabindex="0" x="${cx - barWidth / 2}" y="${H - PAD_B - h}" width="${barWidth}" height="${h}"></rect>`;
    }
    if (totalThisYear > 0) {
      inner += `<rect class="yeartick" data-year="${yt.year}" tabindex="0" x="${cx - barWidth / 2}" y="${H - PAD_B}" width="${barWidth}" height="22"></rect>`;
    }
  }

  return `<h2>Giving Timeline</h2>
    <p style="font-size:.92rem;color:var(--ink-fade);font-style:italic">Total giving each year. Money that actually reached charities (grants, direct gifts) in rust; money moved into their own foundation or fund in gold; pledges in faded. <strong>Hover</strong> a bar for recipients; <strong>click</strong> to jump to that year's evidence.</p>
    <div class="timeline">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${inner}</svg>
      <div class="tt-tip" id="tlTip" role="tooltip" aria-hidden="true"></div>
      <div class="timeline-legend">
        <span><span class="sw grant_out"></span>Reached charities</span>
        <span><span class="sw transfer_in"></span>Moved to own fund</span>
        <span><span class="sw pledge"></span>Pledge announced</span>
      </div>
    </div>`;
}

function renderVehicles(v) {
  let html = `<h2>Where the money lives</h2>
    <p style="font-size:.92rem;color:var(--ink-fade);font-style:italic;margin:0 0 18px">Foundations, LLCs, and other accounts where this person holds or moves charitable money. Public foundations file an annual tax form (the IRS Form 990); LLCs do not, so we can see less of what they do.</p>
    <div class="vehicle-list">`;
  let any = false;

  for (const f of (v.foundations_active || [])) {
    any = true;
    html += `<div class="vehicle active">
      <div class="vname">${esc(f.name)}${f.ein ? ' <span style="color:var(--ink-fade);font-weight:400">· EIN ' + esc(f.ein) + '</span>' : ''}</div>
      <div class="vdetail">Active · ${f.state ? esc(f.state) + ' · ' : ''}${f.assets_usd_latest ? 'assets ' + fmtUsd(f.assets_usd_latest) + ' · ' : ''}${f.officers_compensation ? esc(f.officers_compensation) : ''}
      ${f.source_url ? ' · <a href="' + esc(f.source_url) + '" target="_blank" rel="noopener">source →</a>' : ''}
      ${f.payout_rate_notes ? '<div style="margin-top:4px">' + esc(f.payout_rate_notes) + '</div>' : ''}</div>
    </div>`;
  }

  for (const f of (v.foundations_terminated || [])) {
    any = true;
    html += `<div class="vehicle closed">
      <div class="vname">${esc(f.name)} <span style="color:var(--ink-fade);font-weight:400">· terminated ${esc(f.terminated_year || '')}</span></div>
      <div class="vdetail">${esc(f.status_note || f.focus || '')}</div>
    </div>`;
  }

  for (const l of (v.llcs_philanthropic || [])) {
    any = true;
    html += `<div class="vehicle opaque">
      <div class="vname">${esc(l.name)} <span style="color:var(--ink-fade);font-weight:400">· LLC</span></div>
      <div class="vdetail">${esc(l.classification || l.status || 'LLC — no 990 filing requirement')}</div>
    </div>`;
  }

  for (const fph of (v.for_profit_hybrid_vehicles || [])) {
    any = true;
    html += `<div class="vehicle opaque">
      <div class="vname">${esc(fph.name)} <span style="color:var(--ink-fade);font-weight:400">· for-profit hybrid</span></div>
      <div class="vdetail">${esc(fph.methodology_note || fph.locations || '')}${fph.source_url ? ' · <a href="' + esc(fph.source_url) + '" target="_blank" rel="noopener">source →</a>' : ''}</div>
    </div>`;
  }

  for (const d of (v.dafs_detected || [])) {
    any = true;
    html += `<div class="vehicle opaque">
      <div class="vname">${esc(d.name || 'DAF')} <span style="color:var(--ink-fade);font-weight:400">· donor-advised fund</span></div>
      <div class="vdetail">${esc(d.sponsor || '')} ${esc(d.notes || '')}</div>
    </div>`;
  }

  for (const t of (v.trusts_disclosed_existence_structure_unknown || [])) {
    any = true;
    html += `<div class="vehicle opaque">
      <div class="vname">${esc(t.type || 'Trust')} <span style="color:var(--ink-fade);font-weight:400">· structure undisclosed</span></div>
      <div class="vdetail">${t.source_quote ? '<em>"' + esc(t.source_quote) + '"</em><br>' : ''}${esc(t.classification_note || '')}</div>
    </div>`;
  }

  if (v.offshore_entities && v.offshore_entities.length) {
    for (const o of v.offshore_entities) {
      any = true;
      html += `<div class="vehicle opaque"><div class="vname">${esc(o.name || 'Offshore entity')}</div><div class="vdetail">${esc(o.jurisdiction || '')} ${esc(o.notes || '')}</div></div>`;
    }
  }

  if (!any) html += `<p style="color:var(--ink-fade);font-style:italic">No opaque vehicles detected.</p>`;
  html += `</div>`;
  return html;
}

function normalizeTier(raw) {
  const r = String(raw || '').toLowerCase();
  const m = r.match(/\(tier\s*([abc]\+?)\b/);
  const bracket = m ? m[1] : null;
  const onTrack = /on_track|on track|model_pledger|doing_it|doing it|ceiling|high giving|probably high|a\+/.test(r);
  if (bracket === 'a+') return 'ON_TRACK';
  if (bracket === 'a') return onTrack ? 'ON_TRACK' : 'A_VERIFIED_LOW';
  if (bracket === 'b') return 'B_PROBABLY_LOW';
  if (bracket === 'c') return onTrack ? 'ON_TRACK' : 'C_OPAQUE';
  if (onTrack) return 'ON_TRACK';
  if (/probably_low|probably low|probably_moderate|probably moderate|probably_generous/.test(r)) return 'B_PROBABLY_LOW';
  if (/opaque/.test(r)) return 'C_OPAQUE';
  if (/verified_low|verified low/.test(r)) return 'A_VERIFIED_LOW';
  return 'UNKNOWN';
}
